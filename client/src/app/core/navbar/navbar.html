<nav class="navbar navbar-expand-lg sticky-top" id="mainNav">
  <div class="container">

    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/">
      <div class="brand-icon">
        <i class="bi bi-bag-heart-fill"></i>
      </div>
      <img src="immagini/logo2.png" class="brand-name img-tagliata">
    </a>

    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navContent">

      <div class="mx-auto search-wrapper">
        <div class="input-group">
          <span class="input-group-text search-icon">
            <i class="bi bi-search"></i>
          </span>
          <input
            type="text"
            id="navSearchInput"
            class="form-control search-input"
            placeholder="Cerca libri, materiali, abbigliamento…"
          >
          <button class="btn search-submit-btn" id="navSearchBtn" type="button">
            <i class="bi bi-arrow-right"></i>
          </button>
        </div>
      </div>

      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item">
          <a class="nav-link nav-icon-link" routerLink="/" title="Home">
            <i class="bi bi-house"></i>
            <span class="nav-label">Home</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-icon-link" routerLink="/preferiti" title="Preferiti">
            <i class="bi bi-heart"></i>
            <span class="nav-label">Preferiti</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-icon-link" title="Chat" (click)="apriChat()">
            <i class="bi bi-house"></i>
            <span class="nav-label">Chat</span>
          </a>
        </li>


        @if(loggato) {
          <a class="btn btn-accedi ms-1" style="background-color: #3b82f6" routerLink="/carica" [state]="{ utente: utenteLoggato, provenienza: 'navbar' }">
            <i class="bi bi-person-circle me-1">vendi</i>
          </a>
          <li class="nav-item">
            <button class="theme-toggle" id="btnLogout" title="Cambia tema" (click)="logout()" >
              <img src="immagini/icona_logout.png" alt="Icona" class="bi bi-moon-stars-fill" id="themeIcon" width="26px" height="26px">
            </button>
          </li>
        }
        <li class="nav-item">
          @if(!loggato) {
            <a class="btn btn-accedi ms-1" routerLink="/login">
              <i class="bi bi-person-circle me-1"></i> Accedi
            </a>
          }
          @else {
            <a class="btn btn-accedi ms-1" (click)="visualizzaProfilo()" style="height: 45px; width: 45px">
              <i class="bi bi-person-circle me-1"></i>
            </a>
          }
        </li>
      </ul>

    </div>
  </div>
</nav>
