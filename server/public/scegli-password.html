<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scegli una password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 16px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #4285f4;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #3367d6;
        }

        .error {
            background: #fdecea;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Scegli una password</h1>
        <p>Stai accedendo per la prima volta con Google. Scegli una password per poter accedere anche manualmente in futuro.</p>

        <div class="error" id="errore"></div>
        <div class="success" id="successo"></div>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Minimo 6 caratteri" />

        <label for="conferma">Conferma password</label>
        <input type="password" id="conferma" placeholder="Ripeti la password" />

        <button onclick="inviaPassword()">Conferma e accedi</button>
    </div>

    <script>
        async function inviaPassword() {
            const password = document.getElementById("password").value;
            const conferma = document.getElementById("conferma").value;
            const erroreDiv = document.getElementById("errore");
            const successoDiv = document.getElementById("successo");

            // Reset messaggi
            erroreDiv.style.display = "none";
            successoDiv.style.display = "none";

            // Validazione
            if (!password || password.length < 6) {
                erroreDiv.textContent = "La password deve essere di almeno 6 caratteri.";
                erroreDiv.style.display = "block";
                return;
            }

            if (password !== conferma) {
                erroreDiv.textContent = "Le password non coincidono.";
                erroreDiv.style.display = "block";
                return;
            }

            try {
                const res = await fetch("http://10.0.101.101:3000/api/auth/completa-registrazione", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ password })
});

const data = await res.json();

if (!res.ok) {
    erroreDiv.textContent = data.error || "Errore durante la registrazione.";
    erroreDiv.style.display = "block";
    return;
}

successoDiv.textContent = "Registrazione completata! Reindirizzamento in corso...";
successoDiv.style.display = "block";

setTimeout(() => {
    window.location.href = "http://10.0.101.101:4200";  // ← Angular
}, 1000);
            } catch (err) {
                erroreDiv.textContent = "Errore di rete, riprova.";
                erroreDiv.style.display = "block";
            }
        }
    </script>
</body>
</html>
